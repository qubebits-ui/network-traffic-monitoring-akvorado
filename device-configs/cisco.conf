! ==============================================================================
! Cisco IOS-XR NetFlow v9, SNMP, and BMP Configuration for Akvorado
! Tested on: ASR 9000, NCS 5500 series
! ==============================================================================

! 1. Define the Sampler 
! NOTE: For NCS 5500, it is highly recommended/required to use a power of 2 (e.g., 8192, 16384, 32768)
sampler-map AKVORADO_SAMPLER
 random 1 out-of 8192
!

! 2. Define the Exporter (Targeting the Akvorado server)
flow exporter-map AKVORADO_EXPORTER
 version v9
  options sampler-table timeout 10
  template options timeout 10
 !
 transport udp 2055
 source Loopback0
 destination <AKVORADO_IP> vrf default
!

! 3. Define Flow Monitors for IPv4 and IPv6
flow monitor-map AKVORADO_V4_MONITOR
 record ipv4
 exporter AKVORADO_EXPORTER
 cache entries 100000
 cache timeout active 10
 cache timeout inactive 10
 cache timeout rate-limit 2000
!
flow monitor-map AKVORADO_V6_MONITOR
 record ipv6
 exporter AKVORADO_EXPORTER
 cache entries 100000
 cache timeout active 10
 cache timeout inactive 10
 cache timeout rate-limit 2000
!

! 4. (Optional but Recommended) BGP Attribute Download
! This pushes the AS path to the forwarding database so Source/Dest ASNs are included in NetFlow.
router bgp <YOUR_ASN>
 address-family ipv4 unicast
  bgp attribute-download
 !
 address-family ipv6 unicast
  bgp attribute-download
!

! 5. Apply to Interfaces (Apply ingress to all external-facing interfaces)
interface Bundle-Ether100
 flow ipv4 monitor AKVORADO_V4_MONITOR sampler AKVORADO_SAMPLER ingress
 flow ipv6 monitor AKVORADO_V6_MONITOR sampler AKVORADO_SAMPLER ingress
!

! 6. SNMP Configuration (Allows Akvorado to map interface indexes to names)
snmp-server community <SNMP_COMMUNITY_STRING> RO IPv4
snmp-server ifindex persist
control-plane
 management-plane
  inband
   interface all
    allow SNMP peer
     address ipv4 <AKVORADO_IP>
!

! 7. BMP Configuration (BGP Monitoring Protocol for deep routing analytics)
bmp server 1
 host <AKVORADO_IP> port 10179
 flapping-delay 60
!
bmp server all
 route-monitoring policy post inbound
!
router bgp <YOUR_ASN>
 vrf default
  neighbor <PEER_IP>
   bmp-activate server 1
!
