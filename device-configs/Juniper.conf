/* ============================================================================== */
/* Juniper MX / SRX / PTX Series Configuration for Akvorado                       */
/* Features: Inline J-Flow (IPFIX), SNMP (for interfaces), BMP (for BGP)          */
/* ============================================================================== */

/* ------------------------------------------------------------------------------ */
/* 1. J-Flow / IPFIX Configuration                                                */
/* ------------------------------------------------------------------------------ */

/* Define the Sampling Instance and target the Akvorado collector */
/* Note: Adjust the 'rate' (e.g., 1000 = 1 in 1000 packets) based on traffic volume */
set forwarding-options sampling instance AKVORADO input rate 1000
set forwarding-options sampling instance AKVORADO family inet output flow-server <AKVORADO_IP> port 2055
set forwarding-options sampling instance AKVORADO family inet output flow-server <AKVORADO_IP> version-ipfix template IPFIX-TEMPLATE
set forwarding-options sampling instance AKVORADO family inet output inline-jflow source-address <ROUTER_LOOPBACK_IP>

/* Define the IPFIX Template with aggressive timeouts for real-time Akvorado visibility */
set services flow-monitoring version-ipfix template IPFIX-TEMPLATE flow-active-timeout 60
set services flow-monitoring version-ipfix template IPFIX-TEMPLATE flow-inactive-timeout 15
set services flow-monitoring version-ipfix template IPFIX-TEMPLATE template-refresh-rate packets 1000
set services flow-monitoring version-ipfix template IPFIX-TEMPLATE template-refresh-rate seconds 10
set services flow-monitoring version-ipfix template IPFIX-TEMPLATE ipv4-template

/* Apply Sampling to Transit/External Interfaces */
set interfaces xe-0/0/0 unit 0 family inet sampling input
set interfaces xe-0/0/0 unit 0 family inet sampling output


/* ------------------------------------------------------------------------------ */
/* 2. SNMP Configuration (For Akvorado Interface Enrichment)                      */
/* ------------------------------------------------------------------------------ */

/* Akvorado needs read-only SNMP access to resolve interface indexes (ifIndex) to names */
set snmp location "Datacenter Core"
set snmp community <SNMP_COMMUNITY_STRING> authorization read-only
set snmp community <SNMP_COMMUNITY_STRING> routing-instance default


/* ------------------------------------------------------------------------------ */
/* 3. BMP Configuration (BGP Monitoring Protocol)                                 */
/* ------------------------------------------------------------------------------ */

/* Sends real-time BGP table updates to Akvorado for AS-Path & Prefix analysis */
set routing-options bmp connection-mode active
set routing-options bmp station-address <AKVORADO_IP>
set routing-options bmp station-port 10179
set routing-options bmp station AKVORADO_COLLECTOR
set routing-options bmp hold-down 30 flaps 10 period 30
set routing-options bmp route-monitoring post-policy
set routing-options bmp monitor enable
