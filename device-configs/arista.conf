! ==============================================================================
! Arista EOS sFlow, SNMP, and BMP Configuration for Akvorado
! NOTE: Akvorado supports sFlow natively alongside NetFlow/IPFIX.
! ==============================================================================

! 1. sFlow Configuration
! Adjust sample rate based on bandwidth (1024 for 10G, 8192 for 100G)
sflow sample 8192
sflow sample output subinterface
sflow sample input subinterface

! Define the collector (Akvorado)
! Note: Default sFlow port is 6343, ensure Docker/Akvorado is listening on this port.
sflow vrf default destination <AKVORADO_IP>
sflow vrf default source-interface Loopback0

! Enable globally on all egress interfaces
sflow interface egress enable default
sflow run

! 2. SNMP Configuration (For Interface Enrichment in Akvorado)
snmp-server community <SNMP_COMMUNITY_STRING> ro
! If using a Management VRF for polling:
! snmp-server vrf MGMT
snmp-server contact "NOC Team"
snmp-server location "Datacenter 1"

! 3. BMP (BGP Monitoring Protocol) Configuration
! Sends real-time BGP table updates to Akvorado for AS-Path/Prefix analysis
router bgp <YOUR_ASN>
   bgp monitoring
   monitoring station AKVORADO_COLLECTOR
      ! Use the interface that can route to the Akvorado server
      update-source Loopback0
      connection address <AKVORADO_IP>
      connection mode active port 10179
      
      ! Export full post-policy routing tables
      export-policy received routes post-policy
      export-policy bgp rib bestpaths
!
